name: Deploy GM Sessions Site

on:
  push:
    branches:
      - main
    paths:
      - 'gm_sessions_site/**'
      - '.github/workflows/deploy-gm-sessions-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-gm-sessions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gm_sessions_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

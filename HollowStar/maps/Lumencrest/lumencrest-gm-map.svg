<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Lumencrest  GM City Map</title>
  <desc id="desc">District overview of Lumencrest with GM-only underground access, lamp boundary, tunnel routes, and hidden sites.</desc>

  <defs>
    <style>
      .district-label { font-family: Georgia, 'Times New Roman', serif; font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      .district-sublabel { font-family: Georgia, serif; font-size: 10px; fill: #444; }
      .landmark { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #1a1a1a; font-weight: 600; }
      .gm-label { font-family: Arial, sans-serif; font-size: 9px; fill: #5a2040; font-weight: 600; }
      .gm-label-dark { font-family: Arial, sans-serif; font-size: 9px; fill: #2a4a6a; font-weight: 600; }
      .road-label { font-family: Arial, sans-serif; font-size: 9px; fill: #5a4a3a; font-style: italic; }
      .gate-label { font-family: Arial, sans-serif; font-size: 10px; fill: #2a2a2a; font-weight: 700; }
      .legend-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .legend-text { font-family: Arial, sans-serif; font-size: 10px; fill: #333; }
      .gm-legend { font-family: Arial, sans-serif; font-size: 9px; fill: #5a2040; }
      .map-title { font-family: Georgia, serif; font-size: 26px; font-weight: 700; fill: #1a1a1a; }
      .map-subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #8b2020; font-weight: 600; }
      .compass { font-family: Arial, sans-serif; font-size: 11px; fill: #333; font-weight: 700; }
    </style>

    <marker id="arrow-cable" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8b4513"/>
    </marker>

    <pattern id="underground-hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#6a4a5a" stroke-width="1" opacity="0.35"/>
    </pattern>

    <pattern id="river-pattern" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <rect width="12" height="12" fill="#7eb8d4"/>
      <path d="M0 6 Q3 3 6 6 T12 6" stroke="#5a9ab8" stroke-width="1" fill="none" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="#f4ead8"/>
  <rect x="40" y="40" width="1120" height="820" fill="#efe3cf" stroke="#c4a574" stroke-width="2" rx="4"/>

  <!-- GM watermark stripe -->
  <rect x="40" y="40" width="1120" height="22" fill="#8b2020" fill-opacity="0.12"/>
  <text x="600" y="56" text-anchor="middle" font-family="Arial" font-size="10" fill="#8b2020" font-weight="700">GM REFERENCE  CONTAINS UNDERGROUND &amp; HIDDEN SITES</text>

  <path d="M 160 120 L 1040 120 Q 1080 120 1080 160 L 1080 720 Q 1080 760 1040 760 L 160 760 Q 120 760 120 720 L 120 160 Q 120 120 160 120 Z"
        fill="none" stroke="#6b5a48" stroke-width="4" stroke-linejoin="round"/>

  <path d="M 1040 100 L 1160 100 L 1160 780 L 1040 780 Z" fill="url(#river-pattern)" stroke="#4a8aa8" stroke-width="2"/>
  <text x="1100" y="450" text-anchor="middle" class="district-label" transform="rotate(90 1100 450)" font-size="13">Silverrun River</text>

  <!-- Districts (same as player) -->
  <g id="districts">
    <path d="M 200 130 L 980 130 L 960 270 L 780 280 L 620 275 L 420 270 L 240 265 Z"
          fill="#3d3d45" fill-opacity="0.35" stroke="#2a2a32" stroke-width="2"/>
    <text x="580" y="195" text-anchor="middle" class="district-label" fill="#1a1a22">Shadowside</text>

    <path d="M 140 280 L 400 275 L 395 720 L 140 715 Z"
          fill="#6b7a82" fill-opacity="0.4" stroke="#4a555c" stroke-width="2"/>
    <text x="265" y="500" text-anchor="middle" class="district-label" transform="rotate(-90 265 500)">The Manufactories</text>

    <path d="M 410 295 L 520 290 L 525 540 L 415 545 Z"
          fill="#6a8caf" fill-opacity="0.35" stroke="#4a6a8f" stroke-width="2"/>
    <text x="465" y="415" text-anchor="middle" class="district-label" font-size="13">Academic Quarter</text>

    <ellipse cx="600" cy="430" rx="95" ry="75" fill="#d4b85a" fill-opacity="0.45" stroke="#a88830" stroke-width="2.5"/>
    <text x="600" y="420" text-anchor="middle" class="district-label">Radiant Core</text>

    <rect x="545" y="455" width="110" height="55" rx="4" fill="#8b7355" fill-opacity="0.5" stroke="#5a4a38" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="600" y="488" text-anchor="middle" class="district-sublabel" font-weight="700">Vault District</text>

    <path d="M 530 295 L 1030 290 L 1025 640 L 530 635 Z"
          fill="#c9a050" fill-opacity="0.3" stroke="#9a7838" stroke-width="2"/>
    <text x="780" y="350" text-anchor="middle" class="district-label">Lamplight Ward</text>

    <path d="M 540 645 L 1000 640 L 990 745 L 540 750 Z"
          fill="#7a9a6a" fill-opacity="0.4" stroke="#5a7a4a" stroke-width="2"/>
    <text x="770" y="700" text-anchor="middle" class="district-label">Halfling Quarter</text>
  </g>

  <!-- GM: Electric lamp boundary (Shadowside line) -->
  <path d="M 240 272 Q 580 285 960 272" fill="none" stroke="#e8a020" stroke-width="3" stroke-dasharray="10 6" opacity="0.9"/>
  <text x="400" y="262" class="gm-label" fill="#b07010">˛ Street lamps end (Hollow Road border)</text>

  <!-- GM: Underground club / hidden economy zone -->
  <path d="M 680 265 L 820 268 L 815 310 L 675 305 Z" fill="url(#underground-hatch)" stroke="#6a4a5a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="748" y="292" text-anchor="middle" class="gm-label">Underground club district</text>
  <text x="748" y="303" text-anchor="middle" class="gm-label" font-size="8">(Velvet Room access, etc.)</text>

  <!-- GM: Tunnel network (beneath surface) -->
  <g id="tunnels" stroke="#5a4030" stroke-width="2" fill="none" opacity="0.65" stroke-dasharray="5 4">
  <!-- Main sewer: Shadowside to Manufactories -->
    <path d="M 350 200 Q 400 350 280 480 Q 300 600 280 580"/>
  <!-- Shadowside to Lamplight border junction -->
    <path d="M 690 220 Q 720 280 748 300"/>
  <!-- Lamplight to Academic (infrastructure-adjacent) -->
    <path d="M 748 300 Q 600 380 520 420 Q 480 450 465 400"/>
  <!-- Dry Chambers area -->
    <ellipse cx="735" cy="295" rx="35" ry="22" stroke="#5a4030" stroke-width="1.5" stroke-dasharray="4 3" fill="#5a4030" fill-opacity="0.08"/>
  <!-- Pre-city passages (unmapped extent) -->
    <path d="M 560 500 Q 520 560 480 600 Q 450 640 420 680" stroke="#3a3050" stroke-width="2" stroke-dasharray="3 5" opacity="0.5"/>
    <path d="M 680 200 Q 640 350 580 480" stroke="#3a3050" stroke-width="2" stroke-dasharray="3 5" opacity="0.5"/>
  </g>
  <text x="735" y="330" text-anchor="middle" class="gm-label-dark">Dry Chambers</text>
  <text x="430" y="695" class="gm-label-dark" font-size="8">Pre-city passages (unmapped)</text>
  <text x="620" y="380" class="gm-label-dark" font-size="8">Maze Quarter tunnels</text>

  <!-- GM: Sewer main access points (5) -->
  <g id="sewer-access" fill="#5a2040" stroke="#fff" stroke-width="1">
    <polygon points="600,118 608,130 600,142 592,130"/><title>1. Pauper's Gate maintenance shaft</title>
    <polygon points="690,175 698,187 690,199 682,187"/><title>2. Maze Quarter cellar access</title>
    <polygon points="748,318 756,330 748,342 740,330"/><title>3. Night Pharmacy trapdoor (Lamplight)</title>
    <polygon points="250,490 258,502 250,514 242,502"/><title>4. Manufactories official access (Factory Row)</title>
    <polygon points="1050,480 1058,492 1050,504 1042,492"/><title>5. River treatment / East sewer outfall</title>
  </g>
  <text x="600" y="155" text-anchor="middle" class="gm-label">`</text>
  <text x="690" y="212" text-anchor="middle" class="gm-label">a</text>
  <text x="770" y="335" class="gm-label">b</text>
  <text x="230" y="525" class="gm-label">c</text>
  <text x="1070" y="515" class="gm-label">d</text>

  <!-- Roads -->
  <g id="roads" stroke="#8b7355" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7">
    <line x1="600" y1="270" x2="600" y2="640"/>
    <line x1="400" y1="430" x2="1020" y2="430"/>
    <line x1="400" y1="500" x2="1020" y2="500"/>
    <line x1="720" y1="275" x2="720" y2="130"/>
    <line x1="600" y1="640" x2="900" y2="700"/>
  </g>

  <!-- Cable cars -->
  <g id="cable-cars" stroke="#8b4513" stroke-width="2.5" fill="none" stroke-dasharray="8 4" opacity="0.85">
    <path d="M 900 430 L 780 430 L 600 430 L 465 400 L 280 480"/>
    <path d="M 850 620 L 780 430 L 650 680 L 600 730"/>
    <path d="M 280 580 L 280 480 L 350 200"/>
    <path d="M 950 350 L 465 400 L 1080 420"/>
  </g>
  <g id="stations" fill="#8b4513" stroke="#fff" stroke-width="1">
    <circle cx="600" cy="430" r="6"/>
    <circle cx="780" cy="430" r="5"/>
    <circle cx="900" cy="430" r="5"/>
    <circle cx="465" cy="400" r="5"/>
    <circle cx="280" cy="480" r="5"/>
    <circle cx="280" cy="580" r="5"/>
    <circle cx="350" cy="200" r="5"/>
    <circle cx="850" cy="620" r="5"/>
    <circle cx="650" cy="680" r="5"/>
    <circle cx="600" cy="730" r="5"/>
    <circle cx="950" cy="350" r="5"/>
    <circle cx="1080" cy="420" r="5"/>
  </g>

  <!-- Landmarks + GM hidden sites -->
  <g id="landmarks">
    <polygon points="590,395 610,395 615,410 605,420 595,420 585,410" fill="#c9a84c" stroke="#7a6020" stroke-width="1.5"/>
    <text x="620" y="405" class="landmark">Accord Chamber</text>

    <rect x="568" y="468" width="24" height="18" fill="#5a4a38" stroke="#2a2018" stroke-width="1"/>
    <text x="600" y="465" text-anchor="middle" class="landmark" font-size="9">Vault Gate</text>

    <rect x="440" y="375" width="50" height="35" fill="#5a7a9a" stroke="#3a5a7a" stroke-width="1.5" rx="2"/>
    <text x="465" y="365" text-anchor="middle" class="landmark">Luminarium</text>
    <text x="500" y="395" class="gm-label-dark">The Meridian</text>

    <ellipse cx="455" cy="430" rx="22" ry="12" fill="#7a9aba" stroke="#4a6a8a" stroke-width="1"/>
    <text x="455" y="450" text-anchor="middle" class="landmark" font-size="9">Archives</text>

    <circle cx="780" cy="430" r="14" fill="none" stroke="#9a7838" stroke-width="2"/>
    <circle cx="780" cy="430" r="4" fill="#6ab0d4"/>
    <text x="780" y="455" text-anchor="middle" class="landmark">Merchant Square</text>

    <rect x="220" y="420" width="60" height="70" fill="#5a6268" stroke="#3a4248" stroke-width="1.5"/>
    <rect x="245" y="395" width="10" height="30" fill="#4a5258"/>
    <text x="250" y="505" text-anchor="middle" class="landmark">The Great Press</text>
    <text x="250" y="518" text-anchor="middle" class="gm-label">The Pit (below)</text>

    <ellipse cx="750" cy="690" rx="45" ry="25" fill="#6a9a5a" fill-opacity="0.5" stroke="#4a7a3a" stroke-width="1.5"/>
    <text x="750" y="725" text-anchor="middle" class="landmark">Common Green</text>

    <path d="M 650 150 L 720 145 L 735 210 L 665 215 Z" fill="#2a2a32" fill-opacity="0.4" stroke="#1a1a22" stroke-width="1"/>
    <text x="690" y="185" text-anchor="middle" class="landmark" fill="#eee">Maze Quarter</text>
    <text x="690" y="228" text-anchor="middle" class="gm-label" fill="#c9a0b0">Night Market · The Sump</text>

    <!-- GM-only sites -->
    <text x="560" y="125" class="gm-label">Pauper's Gate Taproom</text>
    <text x="800" y="310" class="gm-label">Remover's Station (near)</text>
    <text x="350" y="215" class="gm-label">Passage Route toll (Doss)</text>
    <text x="560" y="520" class="gm-label-dark" font-size="8">Vault sewer monitors (×3)</text>
  </g>

  <!-- Gates -->
  <g id="gates">
    <rect x="540" y="108" width="120" height="18" fill="#6b5a48" stroke="#3a3028" stroke-width="2" rx="2"/>
    <text x="600" y="100" text-anchor="middle" class="gate-label">Pauper's Gate (N)</text>
    <rect x="820" y="742" width="100" height="18" fill="#6b5a48" stroke="#3a3028" stroke-width="2" rx="2"/>
    <text x="870" y="778" text-anchor="middle" class="gate-label">Copper Gate (S)</text>
    <rect x="108" y="470" width="18" height="80" fill="#6b5a48" stroke="#3a3028" stroke-width="2" rx="2"/>
    <text x="95" y="520" text-anchor="middle" class="gate-label" transform="rotate(-90 95 520)">West Gate</text>
    <rect x="1040" y="400" width="18" height="80" fill="#6b5a48" stroke="#3a3028" stroke-width="2" rx="2"/>
    <text x="1065" y="445" text-anchor="middle" class="gate-label" font-size="9">East Gate</text>
  </g>

  <text x="600" y="88" text-anchor="middle" class="map-title">Lumencrest</text>
  <text x="600" y="108" text-anchor="middle" class="map-subtitle">GM Reference Map  Underground &amp; Hidden Layers</text>

  <g transform="translate(1050, 780)">
    <circle r="28" fill="#efe3cf" stroke="#6b5a48" stroke-width="1.5"/>
    <polygon points="0,-20 5,0 0,-8 -5,0" fill="#8b2020"/>
    <text y="-32" text-anchor="middle" class="compass">N</text>
  </g>

  <!-- Legend (expanded) -->
  <g transform="translate(60, 560)">
    <rect width="220" height="250" fill="#efe3cf" fill-opacity="0.95" stroke="#c4a574" stroke-width="1" rx="3"/>
    <text x="12" y="22" class="legend-title">Legend</text>

    <line x1="12" y1="38" x2="42" y2="38" stroke="#8b7355" stroke-width="4"/>
    <text x="50" y="42" class="legend-text">Major thoroughfare</text>

    <line x1="12" y1="58" x2="42" y2="58" stroke="#8b4513" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="50" y="62" class="legend-text">Cable car line</text>

    <line x1="12" y1="78" x2="42" y2="78" stroke="#e8a020" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="50" y="82" class="gm-legend">Lamp boundary</text>

    <line x1="12" y1="98" x2="42" y2="98" stroke="#5a4030" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="50" y="102" class="gm-legend">Sewer / tunnel route</text>

    <polygon points="27,118 33,130 27,142 21,130" fill="#5a2040"/>
    <text x="50" y="132" class="gm-legend">Sewer main access</text>

    <rect x="12" y="144" width="30" height="14" fill="url(#underground-hatch)" stroke="#6a4a5a"/>
    <text x="50" y="156" class="gm-legend">Hidden / club zone</text>

    <line x1="12" y1="172" x2="42" y2="172" stroke="#3a3050" stroke-width="2" stroke-dasharray="3 5"/>
    <text x="50" y="176" class="gm-legend">Pre-city passages</text>

    <text x="12" y="200" class="legend-text" font-weight="700">Sewer access key:</text>
    <text x="12" y="214" class="gm-legend">` Pauper's Gate  a Maze cellars</text>
    <text x="12" y="228" class="gm-legend">b Night Pharmacy  c Factory Row</text>
    <text x="12" y="242" class="gm-legend">d River outfall</text>
  </g>

  <g transform="translate(60, 820)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#333" stroke-width="2"/>
    <line x1="120" y1="-4" x2="120" y2="4" stroke="#333" stroke-width="2"/>
    <text x="60" y="16" text-anchor="middle" class="legend-text">~1 mile (approximate)</text>
  </g>
</svg>
